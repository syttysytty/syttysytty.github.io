<script>
(function () {

  document.addEventListener('DOMContentLoaded', () => {

    const cards = document.querySelectorAll('.player-card');
    const flipIcon = document.getElementById('global-flip-icon');
    if (!flipIcon || cards.length === 0) return;

    /* ✅ Alle Karten, die ≥80 % sichtbar sind */
    const visibleCards = new Set();

    /* ✅ Observer mit 80 % Sichtbarkeit */
    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.intersectionRatio >= 0.8) {
            visibleCards.add(entry.target);
          } else {
            visibleCards.delete(entry.target);
          }
        });
      },
      { threshold: [0.8] }
    );

    cards.forEach(card => observer.observe(card));

    /* ✅ Globales Icon flippt NUR sichtbare Karten */
    flipIcon.addEventListener('click', () => {
      if (visibleCards.size === 0) return;

      visibleCards.forEach(card => {
        card.classList.toggle('is-flipped');
      });

      /* Optional: Icon-Zustand */
      const anyFlipped = [...visibleCards].some(c =>
        c.classList.contains('is-flipped')
      );
      flipIcon.classList.toggle('active', anyFlipped);
    });

  });

})();

document.addEventListener('DOMContentLoaded', () => {
  const tableIcon = document.getElementById('table-toggle-icon');
  const tableContainer = document.getElementById('table-container');

  if (!tableIcon || !tableContainer) return;

  tableIcon.addEventListener('click', () => {
    tableContainer.classList.toggle('d-none');
    tableIcon.classList.toggle('active');

    // optional: weich nach oben scrollen
    if (!tableContainer.classList.contains('d-none')) {
      tableContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});
</script>
